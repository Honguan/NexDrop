name: Apply NexDrop 2.0 base refactor

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/refactor-node-chat-enrollment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/refactor-node-chat-enrollment
          fetch-depth: 0
      - name: Apply all non-conflicting refactor changes
        shell: bash
        run: |
          set -euo pipefail
          cat .github/refactor-text-patch.* > "$RUNNER_TEMP/nexdrop-v2.patch"
          echo '0ebcbc01061830baa4c2820ee0e0b43100b69bbe0a163c468e64d7b6b6e342bc  '"$RUNNER_TEMP/nexdrop-v2.patch" | sha256sum -c -
          git apply --reject --whitespace=nowarn "$RUNNER_TEMP/nexdrop-v2.patch" || true
          find . -name '*.rej' -delete
          find . -name '*.orig' -delete
          rm -f .github/refactor-text-patch.*
          rm -f .github/workflows/apply-nexdrop-v2.yml
          rm -f .github/workflows/export-refactor-source.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'refactor: apply NexDrop 2.0 base changes'
          git push origin HEAD:agent/refactor-node-chat-enrollment
