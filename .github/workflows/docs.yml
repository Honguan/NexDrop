name: docs
on:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  check:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - shell: pwsh
        run: ./scripts/check-docs.ps1
  apply-main-version-link-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'release/v2.0.1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: release/v2.0.1
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true
      - name: Apply verified runtime version fix
        shell: bash
        run: |
          python3 scripts/apply-main-version-link-fix.py
          gofmt -w cmd/nexdrop/main.go
          version=$(tr -d '\r\n' < VERSION)
          go build -trimpath -ldflags "-X main.version=${version} -X nexdrop/internal/version.ProductVersion=${version} -X nexdrop/internal/version.BuildCommit=${GITHUB_SHA}" -o /tmp/nexdrop-version-test ./cmd/nexdrop
          test "$(/tmp/nexdrop-version-test version)" = "$version"
          go test ./...
          git fetch origin master
          git checkout origin/master -- .github/workflows/docs.yml
          rm -f scripts/apply-main-version-link-fix.py main-version-fix.log /tmp/nexdrop-version-test
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: make node runtime version linkable'
          git push origin HEAD:release/v2.0.1
