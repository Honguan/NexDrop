name: docs
on:
  pull_request:
    paths: ['**.md', 'VERSION', 'scripts/check-docs.ps1', '.github/workflows/docs.yml']
  push:
    branches: [master]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - shell: pwsh
        run: ./scripts/check-docs.ps1
