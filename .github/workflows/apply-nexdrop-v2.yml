name: Apply NexDrop 2.0 base refactor

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/refactor-node-chat-enrollment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/refactor-node-chat-enrollment
          fetch-depth: 0
      - name: Apply and push non-conflicting refactor changes
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/nexdrop-v2-apply.log"
          exec > >(tee -a "$LOG") 2>&1
          echo "head=$(git rev-parse HEAD)"
          cat .github/refactor-text-patch.* > "$RUNNER_TEMP/nexdrop-v2.patch"
          sha256sum "$RUNNER_TEMP/nexdrop-v2.patch"
          git apply --reject --whitespace=nowarn "$RUNNER_TEMP/nexdrop-v2.patch"
          echo "apply_status=$?"
          find . -name '*.rej' -print -delete
          find . -name '*.orig' -print -delete
          rm -f .github/refactor-text-patch.*
          git checkout HEAD -- .github/workflows/apply-nexdrop-v2.yml .github/workflows/export-refactor-source.yml .github/workflows/release.yml
          git status --short
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          echo "diff_check_status=$?"
          git commit -m 'refactor: apply NexDrop 2.0 base changes'
          echo "commit_status=$?"
          git push origin HEAD:agent/refactor-node-chat-enrollment
          echo "push_status=$?"
          exit 0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: nexdrop-v2-apply-diagnostic
          path: ${{ runner.temp }}/nexdrop-v2-apply.log
          if-no-files-found: error
