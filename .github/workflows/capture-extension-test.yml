name: Capture extension test failure

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  capture:
    if: github.head_ref == 'agent/fix-admin-device-pairing-tray-icon'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-admin-device-pairing-tray-icon
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
      - run: npm ci
        working-directory: extension
      - name: Capture tests
        shell: bash
        run: |
          set +e
          npm test > ../extension-test-output.txt 2>&1
          status=$?
          printf '\nEXIT_STATUS=%s\n' "$status" >> ../extension-test-output.txt
          exit 0
        working-directory: extension
      - name: Commit diagnostic output
        shell: bash
        run: |
          rm .github/workflows/capture-extension-test.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add extension-test-output.txt .github/workflows/capture-extension-test.yml
          git commit -m 'chore: capture extension test failure'
          git push origin HEAD:agent/fix-admin-device-pairing-tray-icon
