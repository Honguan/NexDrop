services:
  nexdrop:
    image: "${NEXDROP_IMAGE:-ghcr.io/honguan/nexdrop:2.0.0}"
    build:
      context: .
      args:
        VERSION: "2.0.0"
    environment:
      NEXDROP_HTTP_ADDRESS: ":8080"
      NEXDROP_DATABASE_URL: "postgres://nexdrop@postgres:5432/nexdrop?sslmode=disable"
      NEXDROP_DATABASE_PASSWORD: "${POSTGRES_PASSWORD}"
      NEXDROP_CURSOR_SECRET: "${NEXDROP_CURSOR_SECRET}"
      NEXDROP_STORAGE_PATH: "/var/lib/nexdrop"
      NEXDROP_WEB_PATH: "/usr/share/nexdrop/web"
      NEXDROP_MIGRATIONS_PATH: "/usr/share/nexdrop/migrations"
      NEXDROP_NODE_OWNER: "${NEXDROP_NODE_OWNER:-admin}"
      NEXDROP_NODE_KEY: "${NEXDROP_NODE_KEY:-}"
      NEXDROP_ALLOWED_IPS: "${NEXDROP_ALLOWED_IPS:-}"
      NEXDROP_BOOTSTRAP_ADMIN_USERNAME: "${NEXDROP_BOOTSTRAP_ADMIN_USERNAME:-}"
      NEXDROP_BOOTSTRAP_ADMIN_EMAIL: "${NEXDROP_BOOTSTRAP_ADMIN_EMAIL:-}"
      NEXDROP_BOOTSTRAP_ADMIN_PASSWORD: "${NEXDROP_BOOTSTRAP_ADMIN_PASSWORD:-}"
      NEXDROP_BOOTSTRAP_ADMIN_TOTP_SECRET: "${NEXDROP_BOOTSTRAP_ADMIN_TOTP_SECRET:-}"
      NEXDROP_LOGIN_RATE_LIMIT_PER_MINUTE: "${NEXDROP_LOGIN_RATE_LIMIT_PER_MINUTE:-10}"
      NEXDROP_ADMIN_RATE_LIMIT_PER_MINUTE: "${NEXDROP_ADMIN_RATE_LIMIT_PER_MINUTE:-30}"
    volumes:
      - file-data:/var/lib/nexdrop
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexdrop
      POSTGRES_USER: nexdrop
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexdrop -d nexdrop"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    environment:
      NEXDROP_SITE_ADDRESS: "${NEXDROP_SITE_ADDRESS:-:80}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      nexdrop:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  file-data:
  caddy-data:
  caddy-config:
