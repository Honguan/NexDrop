services:
  nexdrop:
    build: .
    environment:
      NEXDROP_HTTP_ADDRESS: ":8080"
      NEXDROP_DATABASE_URL: "postgres://nexdrop:${POSTGRES_PASSWORD}@postgres:5432/nexdrop?sslmode=disable"
      NEXDROP_STORAGE_PATH: "/var/lib/nexdrop"
      NEXDROP_BOOTSTRAP_ADMIN_USERNAME: "${NEXDROP_BOOTSTRAP_ADMIN_USERNAME:-}"
      NEXDROP_BOOTSTRAP_ADMIN_EMAIL: "${NEXDROP_BOOTSTRAP_ADMIN_EMAIL:-}"
      NEXDROP_BOOTSTRAP_ADMIN_PASSWORD: "${NEXDROP_BOOTSTRAP_ADMIN_PASSWORD:-}"
    volumes:
      - file-data:/var/lib/nexdrop
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexdrop
      POSTGRES_USER: nexdrop
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexdrop -d nexdrop"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    environment:
      NEXDROP_DOMAIN: "${NEXDROP_DOMAIN:-localhost}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      nexdrop:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  file-data:
  caddy-data:
  caddy-config:
