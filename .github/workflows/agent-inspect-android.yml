name: Agent inspect Android entrypoint

on:
  push:
    branches:
      - agent/fix-windows-exit-device-join
    paths:
      - .github/workflows/agent-inspect-android.yml
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect source snapshot
        shell: bash
        run: |
          set -eu
          {
            find client/android/app/src/main -maxdepth 12 -type f -print | sort
            echo '--- MAIN ACTIVITY ---'
            find client/android/app/src/main -type f \( -name 'MainActivity.kt' -o -name 'MainActivity.java' \) -print -exec sed -n '1,320p' {} \;
          } > android-entrypoint.txt
          tar --exclude=.git --exclude=source-snapshot.tar.gz -czf source-snapshot.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: android-entrypoint
          path: android-entrypoint.txt
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: source-snapshot.tar.gz
          if-no-files-found: error
