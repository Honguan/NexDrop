name: extension-ci
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
jobs:
  test:
    name: extension-ci
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: extension}}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with: {node-version: 24, cache: npm, cache-dependency-path: extension/package-lock.json}
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: 檢查封裝內容
        run: |
          test -f dist/manifest.json
          ! grep -R -E '(BEGIN .*PRIVATE KEY|NEXDROP_.*PASSWORD=)' dist
      - name: 封裝 Chrome 與 Edge ZIP
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          ./scripts/package-release.ps1 -Version $version
          if (-not (Test-Path "../dist/NexDrop-Extension-Chrome_${version}.zip")) { throw 'Chrome ZIP missing' }
          if (-not (Test-Path "../dist/NexDrop-Extension-Edge_${version}.zip")) { throw 'Edge ZIP missing' }
