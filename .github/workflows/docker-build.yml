name: docker-build
on:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
jobs:
  build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          load: true
          push: false
          tags: nexdrop:test
      - run: docker run --rm nexdrop:test version | grep '^1.0.0$'
      - name: е•ҹеӢ•иҲҮеҒҘеә·жӘўжҹҘ
        env:
          POSTGRES_PASSWORD: docker-test-only
          NEXDROP_CURSOR_SECRET: docker-test-only-cursor-secret-32-bytes
          NEXDROP_IMAGE: nexdrop:test
        run: |
          trap 'docker compose down -v' EXIT
          docker compose up -d --no-build postgres nexdrop
          for _ in $(seq 1 30); do
            container=$(docker compose ps -q nexdrop)
            status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$container" 2>/dev/null || true)
            test "$status" = healthy && break
            sleep 2
          done
          test "$(docker inspect --format '{{.State.Health.Status}}' "$container")" = healthy
          docker compose exec -T nexdrop wget -q -O - http://127.0.0.1:8080/healthz || docker compose logs nexdrop
      - name: жҳ еғҸиҲҮз§ҳеҜҶй©—иӯү
        run: |
          docker image inspect nexdrop:test --format '{{.Id}}' | tee image-digest.txt
          ! docker image inspect nexdrop:test | grep -E 'docker-test-only|BEGIN (RSA |EC )?PRIVATE KEY'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with: {name: docker-image-digest, path: image-digest.txt, if-no-files-found: error}
