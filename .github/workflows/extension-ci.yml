name: extension-ci
on:
  pull_request:
    paths: ['extension/**', '.github/workflows/extension-ci.yml']
  push:
    branches: [master]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: extension}}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: {node-version: 24, cache: npm, cache-dependency-path: extension/package-lock.json}
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: 檢查封裝內容
        run: |
          test -f dist/manifest.json
          ! grep -R -E '(BEGIN .*PRIVATE KEY|NEXDROP_.*PASSWORD=)' dist
