name: integration-test
on:
  workflow_call:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
jobs:
  postgres:
    name: integration-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env: {POSTGRES_DB: nexdrop_test, POSTGRES_USER: nexdrop, POSTGRES_PASSWORD: test-only-password}
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nexdrop -d nexdrop_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      PGPASSWORD: test-only-password
      NEXDROP_TEST_DATABASE_URL: postgres://nexdrop:test-only-password@127.0.0.1:5432/nexdrop_test?sslmode=disable
      NEXDROP_DATABASE_URL: postgres://nexdrop:test-only-password@127.0.0.1:5432/nexdrop_test?sslmode=disable
      NEXDROP_CURSOR_SECRET: integration-test-only-cursor-secret-32-bytes
      NEXDROP_STORAGE_PATH: /tmp/nexdrop-storage
      NEXDROP_WEB_PATH: web/dist
      NEXDROP_MIGRATIONS_PATH: migrations
      NEXDROP_BOOTSTRAP_ADMIN_USERNAME: integration-admin
      NEXDROP_BOOTSTRAP_ADMIN_EMAIL: integration@example.invalid
      NEXDROP_BOOTSTRAP_ADMIN_PASSWORD: Integration-test-only-1234
      NEXDROP_INTEGRATION_DISPOSABLE: 'true'
      NEXDROP_LOGIN_RATE_LIMIT_PER_MINUTE: '200'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with: {go-version-file: go.mod, cache: true}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with: {node-version: 24, cache: npm, cache-dependency-path: web/package-lock.json}
      - run: npm ci && npm run build
        working-directory: web
      - name: 驗證完整 API 與 WebSocket 資料流
        timeout-minutes: 15
        run: |
          mkdir -p "$NEXDROP_STORAGE_PATH"
          version=$(tr -d '\r\n' < VERSION)
          go build -trimpath -ldflags "-X nexdrop/internal/version.ProductVersion=${version} -X nexdrop/internal/version.BuildCommit=${GITHUB_SHA}" \
            -o "$RUNNER_TEMP/nexdrop-integration" ./cmd/nexdrop
          server_pid=''
          smoke_pid=''
          migration_pid=''
          restart_barrier=''
          rollback_database='nexdrop_migration_rollback'
          postgres_container=$(docker ps --filter publish=5432 --format '{{.ID}}' | head -n 1)
          test -n "$postgres_container"
          stop_process() {
            pid="$1"
            kill "$pid" 2>/dev/null || true
            for _ in $(seq 1 20); do
              if ! kill -0 "$pid" 2>/dev/null; then break; fi
              sleep 0.25
            done
            if kill -0 "$pid" 2>/dev/null; then kill -KILL "$pid" 2>/dev/null || true; fi
            wait "$pid" 2>/dev/null || true
          }
          cleanup() {
            status=$?
            if [ -n "$smoke_pid" ]; then
              stop_process "$smoke_pid"
            fi
            if [ -n "$server_pid" ]; then
              stop_process "$server_pid"
            fi
            if [ -n "$migration_pid" ]; then
              stop_process "$migration_pid"
            fi
            docker exec "$postgres_container" dropdb --if-exists --force -U nexdrop "$rollback_database" >/dev/null 2>&1 || true
            docker exec "$postgres_container" rm -f /tmp/nexdrop-pre-upgrade.dump >/dev/null 2>&1 || true
            if [ "$status" -ne 0 ]; then
              cat server.log 2>/dev/null || true
              cat migration-server.log 2>/dev/null || true
            fi
            rm -rf -- "$NEXDROP_STORAGE_PATH"
            rm -rf -- "$RUNNER_TEMP/nexdrop-initial-migration"
            rm -f -- "$RUNNER_TEMP/nexdrop-integration"
            if [ -n "$restart_barrier" ]; then
              rm -f -- "$restart_barrier.ready" "$restart_barrier.continue" "$restart_barrier.file-id"
            fi
            rm -f -- server.log migration-server.log
            trap - EXIT
            exit "$status"
          }
          trap cleanup EXIT
          start_server() {
            "$RUNNER_TEMP/nexdrop-integration" >server.log 2>&1 &
            server_pid=$!
            ready=false
            for _ in $(seq 1 30); do
              if curl --connect-timeout 1 --max-time 2 --fail --silent http://127.0.0.1:8080/readyz >/dev/null; then ready=true; break; fi
              sleep 1
            done
            test "$ready" = true
          }
          start_migration_server() {
            database_url="$1"
            migrations_path="$2"
            NEXDROP_DATABASE_URL="$database_url" NEXDROP_MIGRATIONS_PATH="$migrations_path" \
              NEXDROP_HTTP_ADDRESS='127.0.0.1:18080' "$RUNNER_TEMP/nexdrop-integration" >migration-server.log 2>&1 &
            migration_pid=$!
            ready=false
            for _ in $(seq 1 30); do
              if curl --connect-timeout 1 --max-time 2 --fail --silent http://127.0.0.1:18080/readyz >/dev/null; then ready=true; break; fi
              sleep 1
            done
            test "$ready" = true
            stop_process "$migration_pid"
            migration_pid=''
          }
          rollback_url="postgres://nexdrop:test-only-password@127.0.0.1:5432/${rollback_database}?sslmode=disable"
          docker exec "$postgres_container" dropdb --if-exists --force -U nexdrop "$rollback_database"
          docker exec "$postgres_container" createdb -U nexdrop "$rollback_database"
          mkdir -p "$RUNNER_TEMP/nexdrop-initial-migration"
          cp migrations/001_initial.sql "$RUNNER_TEMP/nexdrop-initial-migration/"
          start_migration_server "$rollback_url" "$RUNNER_TEMP/nexdrop-initial-migration"
          docker exec "$postgres_container" psql -v ON_ERROR_STOP=1 -U nexdrop -d "$rollback_database" \
            -c "INSERT INTO users (username,email,password_hash) VALUES ('rollback-sentinel','rollback@example.invalid','unused')"
          docker exec "$postgres_container" pg_dump -U nexdrop -d "$rollback_database" -Fc -f /tmp/nexdrop-pre-upgrade.dump
          start_migration_server "$rollback_url" migrations
          test "$(docker exec "$postgres_container" psql -U nexdrop -d "$rollback_database" -tAc \
            "SELECT count(*) FROM schema_migrations")" = 9
          test "$(docker exec "$postgres_container" psql -U nexdrop -d "$rollback_database" -tAc \
            "SELECT to_regclass('public.idempotency_records') IS NOT NULL")" = t
          docker exec "$postgres_container" dropdb --force -U nexdrop "$rollback_database"
          docker exec "$postgres_container" createdb -U nexdrop "$rollback_database"
          docker exec "$postgres_container" pg_restore --exit-on-error -U nexdrop -d "$rollback_database" /tmp/nexdrop-pre-upgrade.dump
          test "$(docker exec "$postgres_container" psql -U nexdrop -d "$rollback_database" -tAc \
            "SELECT count(*) FROM users WHERE username='rollback-sentinel'")" = 1
          test "$(docker exec "$postgres_container" psql -U nexdrop -d "$rollback_database" -tAc \
            "SELECT count(*) FROM schema_migrations")" = 1
          test "$(docker exec "$postgres_container" psql -U nexdrop -d "$rollback_database" -tAc \
            "SELECT to_regclass('public.idempotency_records') IS NULL")" = t
          docker exec "$postgres_container" dropdb --force -U nexdrop "$rollback_database"
          docker exec "$postgres_container" rm -f /tmp/nexdrop-pre-upgrade.dump
          start_server
          stop_process "$server_pid"
          server_pid=''
          go test -count=1 ./internal/postgres/...
          start_server
          host_memory=$(awk '/MemTotal/ {printf "%.1f GiB", $2/1024/1024}' /proc/meminfo)
          go run ./cmd/nexdrop-loadtest \
            -url http://127.0.0.1:8080 \
            -username "$NEXDROP_BOOTSTRAP_ADMIN_USERNAME" \
            -password "$NEXDROP_BOOTSTRAP_ADMIN_PASSWORD" \
            -setup-scenario -devices 100 -online 50 -transfers 10 \
            -requests 1000 -concurrency 10 -max-p95 500ms \
            -environment "GitHub Actions ubuntu-latest; $(nproc) logical CPUs; ${host_memory} memory" \
            -postgres 'PostgreSQL 17 Alpine service container' \
            -report load-verification-report.json
          recovery_token=$(curl --connect-timeout 5 --max-time 15 --fail-with-body --silent --show-error -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg identifier "$NEXDROP_BOOTSTRAP_ADMIN_USERNAME" --arg password "$NEXDROP_BOOTSTRAP_ADMIN_PASSWORD" \
              '{identifier:$identifier,password:$password}')" http://127.0.0.1:8080/api/auth/login | jq -er '.accessToken')
          docker stop "$postgres_container" >/dev/null
          ready_status=$(curl --max-time 5 --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8080/readyz || true)
          test "$ready_status" = 503
          unavailable_device_name="Must-not-persist-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          unavailable_write=$(curl --max-time 10 --silent --output /dev/null --write-out '%{http_code}' -H "Authorization: Bearer $recovery_token" \
            -H 'Content-Type: application/json' --data "$(jq -nc --arg name "$unavailable_device_name" \
              '{displayName:$name,type:"WEB_CHROME",publicKey:"AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=",keyAlgorithm:"X25519"}')" \
            http://127.0.0.1:8080/api/devices || true)
          test "$unavailable_write" = 503
          docker start "$postgres_container" >/dev/null
          database_ready=false
          for _ in $(seq 1 30); do
              if curl --connect-timeout 1 --max-time 2 --fail --silent http://127.0.0.1:8080/readyz >/dev/null; then database_ready=true; break; fi
            sleep 1
          done
          test "$database_ready" = true
          test "$(docker exec "$postgres_container" psql -U nexdrop -d nexdrop_test -tAc \
            "SELECT count(*) FROM devices WHERE display_name='$unavailable_device_name'")" = 0

          restart_barrier="$RUNNER_TEMP/nexdrop-restart-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -f -- "$restart_barrier.ready" "$restart_barrier.continue" "$restart_barrier.file-id"
          NEXDROP_INTEGRATION_RESTART_BARRIER="$restart_barrier" bash scripts/integration-smoke.sh &
          smoke_pid=$!
          reached_barrier=false
          for _ in $(seq 1 60); do
            if [ -f "$restart_barrier.ready" ]; then reached_barrier=true; break; fi
            if ! kill -0 "$smoke_pid" 2>/dev/null; then break; fi
            sleep 1
          done
          test "$reached_barrier" = true
          stop_process "$server_pid"
          server_pid=''
          start_server
          : >"$restart_barrier.continue"
          smoke_completed=false
          for _ in $(seq 1 180); do
            if ! kill -0 "$smoke_pid" 2>/dev/null; then smoke_completed=true; break; fi
            sleep 1
          done
          test "$smoke_completed" = true
          wait "$smoke_pid"
          smoke_pid=''

          file_id=$(cat "$restart_barrier.file-id")
          stop_process "$server_pid"
          server_pid=''
          docker exec "$postgres_container" psql -v ON_ERROR_STOP=1 -U nexdrop -d nexdrop_test \
            -c "UPDATE files SET expires_at=now()-interval '1 minute' WHERE id='$file_id'::uuid" >/dev/null
          test "$("$RUNNER_TEMP/nexdrop-integration" cleanup --limit 100 | jq -er '.cleaned')" = 1
          test "$("$RUNNER_TEMP/nexdrop-integration" cleanup --limit 100 | jq -er '.cleaned')" = 0
          test "$(docker exec "$postgres_container" psql -U nexdrop -d nexdrop_test -tAc "SELECT status FROM files WHERE id='$file_id'::uuid")" = EXPIRED
          rm -f -- "$restart_barrier.ready" "$restart_barrier.continue" "$restart_barrier.file-id"
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: load-verification-report
          path: load-verification-report.json
          if-no-files-found: error
          retention-days: 14
