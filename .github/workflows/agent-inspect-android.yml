name: Agent apply NexDrop fixes

on:
  pull_request:
    branches:
      - master
    paths:
      - tools/nexdrop-fix.ready

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-windows-exit-device-join
          fetch-depth: 0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true
      - name: Apply reviewed patch
        shell: bash
        run: |
          set -o pipefail
          {
            set -euxo pipefail
            cat tools/nexdrop-fix.patch.xz.b64.* > /tmp/nexdrop-fix.patch.xz.b64
            wc -c /tmp/nexdrop-fix.patch.xz.b64
            sha256sum /tmp/nexdrop-fix.patch.xz.b64
            base64 --decode /tmp/nexdrop-fix.patch.xz.b64 > /tmp/nexdrop-fix.patch.xz
            wc -c /tmp/nexdrop-fix.patch.xz
            sha256sum /tmp/nexdrop-fix.patch.xz
            xz -t /tmp/nexdrop-fix.patch.xz
            xz -dc /tmp/nexdrop-fix.patch.xz > /tmp/nexdrop-fix.patch
            wc -c /tmp/nexdrop-fix.patch
            sha256sum /tmp/nexdrop-fix.patch
            git apply --check --whitespace=error --exclude=.github/workflows/agent-inspect-android.yml /tmp/nexdrop-fix.patch
            git apply --whitespace=error --exclude=.github/workflows/agent-inspect-android.yml /tmp/nexdrop-fix.patch
            rm -f .github/workflows/agent-inspect-android.yml tools/nexdrop-fix.patch.xz.b64.* tools/nexdrop-fix.ready
            gofmt -w \
              cmd/nexdrop/main.go \
              cmd/nexdrop-desktop-service/main.go \
              cmd/nexdrop-desktop-service/parent_windows.go \
              cmd/nexdrop-desktop-service/parent_other.go \
              internal/api/api.go \
              internal/api/api_test.go \
              internal/device/service.go \
              internal/device/service_test.go \
              internal/postgres/store.go
            dart format \
              client/lib/app_controller.dart \
              client/lib/core/api_client.dart \
              client/lib/core/node_join.dart \
              client/lib/core/platform_share.dart \
              client/lib/main.dart \
              client/test/api_client_test.dart \
              client/test/node_join_test.dart
            git diff --check
          } 2>&1 | tee /tmp/nexdrop-apply.log
      - name: Upload apply log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexdrop-apply-log
          path: /tmp/nexdrop-apply.log
          if-no-files-found: error
      - name: Commit fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "OpenAI Codex"
          git config user.email "codex@openai.com"
          git add -A
          git commit -m "fix: repair app lifecycle and device onboarding"
          git push origin HEAD:agent/fix-windows-exit-device-join
