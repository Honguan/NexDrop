name: security
on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: '17 3 * * 1'
permissions:
  contents: read
jobs:
  changes:
    name: security changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: {fetch-depth: 0}
      - id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "client=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- client; then
            echo "client=false" >> "$GITHUB_OUTPUT"
          else
            echo "client=true" >> "$GITHUB_OUTPUT"
          fi
  secrets:
    name: security-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: {fetch-depth: 0}
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  codeql:
    name: security-codeql
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9
        with: {languages: 'go,javascript-typescript'}
      - uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a
      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9
  dependencies:
    name: security-dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with: {go-version-file: go.mod}
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with: {node-version: 24}
      - run: npm audit --omit=dev --audit-level=high
        working-directory: web
      - run: npm audit --omit=dev --audit-level=high
        working-directory: extension
      - run: go run github.com/google/go-licenses@v1.6.0 check ./... --disallowed_types=forbidden,restricted
  dart:
    name: security-dart
    needs: changes
    if: ${{ needs.changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with: {channel: stable, cache: true}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with: {go-version-file: go.mod, cache: true}
      - run: flutter pub get
        working-directory: client
      - run: flutter analyze
        working-directory: client
      - run: go run github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.2 scan source --lockfile=client/pubspec.lock
  container:
    name: security-container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: docker build -t nexdrop:security .
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with: {image-ref: 'nexdrop:security', severity: 'HIGH,CRITICAL', ignore-unfixed: true, exit-code: '1'}
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with: {image-ref: 'nexdrop:security', format: 'cyclonedx', output: 'nexdrop.cdx.json'}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with: {name: security-sbom, path: nexdrop.cdx.json, if-no-files-found: error}
  gate:
    name: security
    if: always()
    needs: [secrets, codeql, dependencies, dart, container]
    runs-on: ubuntu-latest
    steps:
      - name: 驗證所有安全檢查
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          test "$(jq -r '[.[].result] | all(. == "success" or . == "skipped")' <<<"$RESULTS")" = true
