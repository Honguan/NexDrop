name: docs
on:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  check:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - shell: pwsh
        run: ./scripts/check-docs.ps1
  apply-main-version-link-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'release/v2.0.1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: release/v2.0.1
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true
      - name: Capture runtime version diagnostics
        shell: bash
        run: |
          if test -f main-version-fix.log; then
            cat main-version-fix.log
            exit 0
          fi
          set +e
          {
            set -x
            python3 scripts/apply-main-version-link-fix.py
            gofmt -w cmd/nexdrop/main.go
            version=$(tr -d '\r\n' < VERSION)
            go build -trimpath -ldflags "-X main.version=${version} -X nexdrop/internal/version.ProductVersion=${version} -X nexdrop/internal/version.BuildCommit=${GITHUB_SHA}" -o /tmp/nexdrop-version-test ./cmd/nexdrop
            actual=$(/tmp/nexdrop-version-test version)
            printf 'EXPECTED=%s\nACTUAL=%s\n' "$version" "$actual"
            test "$actual" = "$version"
            go test ./...
          } >main-version-fix.log 2>&1
          status=$?
          cat main-version-fix.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add main-version-fix.log
          git commit -m 'chore: capture runtime version diagnostics'
          git push origin HEAD:release/v2.0.1
          exit 0
