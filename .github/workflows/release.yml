name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
jobs:
  integration:
    uses: ./.github/workflows/integration-test.yml

  validate:
    needs: integration
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - id: version
        run: |
          version=$(tr -d '\r\n' < VERSION)
          test "${GITHUB_REF_NAME}" = "v${version}"
          grep -q '"version": "'"${version}"'"' web/package.json
          grep -q '"version": "'"${version}"'"' extension/package.json
          grep -q '^version: '"${version}"'+' client/pubspec.yaml
          grep -q "## \[${version}\]" CHANGELOG.md
          test -f "docs/release-notes-v${version}.md"
          echo "value=${version}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with: {go-version-file: go.mod, cache: true}
      - run: go test ./...
      - run: go vet ./...
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with: {node-version: 24}
      - run: npm ci && npm run lint && npm run typecheck && npm test && npm run build
        working-directory: web
      - run: npm ci && npm run lint && npm run typecheck && npm test && npm run build
        working-directory: extension
      - shell: pwsh
        run: ./scripts/check-docs.ps1

  node:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with: {go-version-file: go.mod, cache: true}
      - shell: pwsh
        run: ./scripts/build-node-release.ps1 -Version '${{ needs.validate.outputs.version }}' -Commit '${{ github.sha }}'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with: {name: node-release, path: 'dist/*.tar.gz', if-no-files-found: error}

  extension:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with: {node-version: 24, cache: npm, cache-dependency-path: extension/package-lock.json}
      - run: npm ci
        working-directory: extension
      - shell: pwsh
        run: ./extension/scripts/package-release.ps1 -Version '${{ needs.validate.outputs.version }}'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with: {name: extension-release, path: 'dist/NexDrop-Extension-*.zip', if-no-files-found: error}

  android:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      formal_signing: ${{ steps.signing.outputs.formal }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with: {channel: stable, cache: true}
      - id: signing
        name: 準備可選 Android 簽章
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if test -n "$KEYSTORE_BASE64" && test -n "$STORE_PASSWORD" && test -n "$KEY_ALIAS" && test -n "$KEY_PASSWORD"; then
            echo "$KEYSTORE_BASE64" | base64 --decode > client/android/app/release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.jks\n' "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > client/android/key.properties
            echo 'formal=true' >> "$GITHUB_OUTPUT"
          else
            password=$(openssl rand -hex 24)
            keytool -genkeypair -noprompt -keystore client/android/app/release.jks -storepass "$password" -keypass "$password" -alias nexdrop-temporary -keyalg RSA -keysize 3072 -validity 30 -dname 'CN=NexDrop Temporary Release,O=NexDrop'
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=nexdrop-temporary\nstoreFile=release.jks\n' "$password" "$password" > client/android/key.properties
            echo 'formal=false' >> "$GITHUB_OUTPUT"
            echo '未設定 Android 簽章 Secrets，將建立可安裝的臨時簽章 APK；下個版本可能需要先移除舊版。'
          fi
      - run: flutter pub get && flutter test && flutter build apk --release
        working-directory: client
      - name: 驗證 Android APK 可安裝簽章
        run: |
          apksigner=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)
          test -x "$apksigner"
          "$apksigner" verify --verbose --print-certs client/build/app/outputs/flutter-apk/app-release.apk | tee apk-signature.txt
          ! grep -qi 'Android Debug' apk-signature.txt
          grep -q 'Verified using v1 scheme (JAR signing): true' apk-signature.txt
          grep -q 'Verified using v2 scheme (APK Signature Scheme v2): true' apk-signature.txt
      - run: cp client/build/app/outputs/flutter-apk/app-release.apk 'NexDrop-Android_${{ needs.validate.outputs.version }}.apk'
      - if: always()
        run: rm -f -- client/android/app/release.jks client/android/key.properties apk-signature.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with: {name: android-release, path: 'NexDrop-Android_*.apk', if-no-files-found: error}

  windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with: {channel: stable, cache: true}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with: {go-version-file: go.mod, cache: true}
      - name: 建置 Windows 產物並套用可選簽章
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:CERTIFICATE_BASE64 -and $env:CERTIFICATE_PASSWORD) {
            $certificatePath = "$env:RUNNER_TEMP\nexdrop.pfx"
            [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
            try {
              ./client/windows/build-release.ps1 -Version '${{ needs.validate.outputs.version }}' -CertificatePath $certificatePath -CertificatePassword $env:CERTIFICATE_PASSWORD
            } finally {
              Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue
            }
          } else {
            Write-Host '未設定 Windows 簽章 Secrets，將建立未簽章 EXE/ZIP。'
            ./client/windows/build-release.ps1 -Version '${{ needs.validate.outputs.version }}'
          }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with: {name: windows-release, path: 'dist/NexDrop-Desktop_*', if-no-files-found: error}

  container:
    needs: [validate, node, extension, android, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with: {registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}'}
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/honguan/nexdrop:${{ needs.validate.outputs.version }}
            ghcr.io/honguan/nexdrop:1.0
            ghcr.io/honguan/nexdrop:latest
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with: {subject-name: ghcr.io/honguan/nexdrop, subject-digest: '${{ steps.build.outputs.digest }}', push-to-registry: true}
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac
      - run: cosign sign --yes 'ghcr.io/honguan/nexdrop@${{ steps.build.outputs.digest }}'
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with: {image: 'ghcr.io/honguan/nexdrop@${{ steps.build.outputs.digest }}', format: spdx-json, output-file: nexdrop-node.spdx.json, upload-artifact: false}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with: {name: container-sbom, path: nexdrop-node.spdx.json, if-no-files-found: error}

  draft:
    needs: [validate, node, extension, android, windows, container]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with: {path: release-assets, merge-multiple: true}
      - run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name 'checksums-*' -print0 | sort -z | xargs -0 sha256sum > checksums-sha256.txt
          sha256sum --check checksums-sha256.txt
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with: {subject-path: 'release-assets/*'}
      - name: 建立實際發布說明
        run: |
          cp 'docs/release-notes-v${{ needs.validate.outputs.version }}.md' release-notes.md
          if test '${{ needs.android.outputs.formal_signing }}' != true; then
            printf '\n## Android 安裝與更新提醒\n\n此 APK 使用臨時簽章，可在 Samsung J6 等 Android 8 裝置安裝。由於後續版本的臨時簽章可能不同，更新時可能需要先移除舊版；要直接覆蓋更新，維護者應設定固定的 Android 正式簽章 Secrets。\n' >> release-notes.md
          fi
      - env: {GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'}
        run: gh release create '${{ github.ref_name }}' release-assets/* --draft --verify-tag --title 'NexDrop ${{ needs.validate.outputs.version }}' --notes-file release-notes.md
