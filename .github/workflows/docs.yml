name: docs
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
jobs:
  check:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - shell: pwsh
        run: ./scripts/check-docs.ps1
