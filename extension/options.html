<!doctype html>
<html lang="zh-Hant">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><link rel="stylesheet" href="popup.css" /><title>NexDrop 設定</title></head>
  <body class="options">
    <main>
      <div class="brand"><span>N</span><strong>NexDrop</strong></div>
      <p class="eyebrow">JOIN NODE</p><h1>使用節點密鑰加入</h1>
      <p class="hint">只需輸入節點連結與節點密鑰，設備便會直接加入節點。</p>
      <form>
        <label for="node-url">NexDrop 節點連結</label><input id="node-url" type="url" placeholder="http://192.168.1.10 或 https://drop.example.com" required />
        <label for="node-key">節點密鑰</label><input id="node-key" type="password" autocomplete="off" minlength="16" required />
        <label for="device-name">設備名稱</label><input id="device-name" value="瀏覽器擴充功能" minlength="3" maxlength="100" required />
        <div class="actions"><button id="import-config" type="button" class="secondary">從剪貼簿匯入</button><button id="copy-config" type="button" class="secondary">複製設定</button></div>
        <p class="hint">IP 可直接使用 HTTP；公開網域建議使用 HTTPS。Web 管理後台的帳號、密碼與 OTP 不需要提供給一般設備。</p>
        <button type="submit" class="primary">加入節點</button>
        <button id="disconnect" type="button" class="secondary" hidden>中斷本機連線</button>
        <p id="save-status" role="status"></p>
      </form>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
