name: docs
on:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  check:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - shell: pwsh
        run: ./scripts/check-docs.ps1
  apply-update-secret-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/update-generate-node-otp-secrets'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/update-generate-node-otp-secrets
          fetch-depth: 0
      - name: Capture patch failure
        shell: bash
        run: |
          if test -f update-secret-fix.log; then
            cat update-secret-fix.log
            exit 0
          fi
          set +e
          {
            python3 scripts/apply-update-secret-fix.py
            sh -n deploy/nexdrop
            ./scripts/deploy-flow-test.sh
          } >update-secret-fix.log 2>&1
          status=$?
          cat update-secret-fix.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add update-secret-fix.log
          git commit -m 'chore: capture update secret fix failure'
          git push origin HEAD:fix/update-generate-node-otp-secrets
          exit "$status"
