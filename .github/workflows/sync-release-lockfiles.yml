name: Sync release lockfiles

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'agent/fix-admin-device-pairing-tray-icon'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-admin-device-pairing-tray-icon
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
      - name: Regenerate lockfiles
        run: |
          npm install --package-lock-only --ignore-scripts
          npm install --package-lock-only --ignore-scripts --prefix ../extension
        working-directory: web
      - name: Commit lockfiles
        run: |
          rm .github/workflows/sync-release-lockfiles.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web/package-lock.json extension/package-lock.json .github/workflows/sync-release-lockfiles.yml
          git commit -m 'release: sync 1.0.6 lockfiles'
          git push origin HEAD:agent/fix-admin-device-pairing-tray-icon
