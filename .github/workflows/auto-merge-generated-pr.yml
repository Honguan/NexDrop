name: auto-merge-generated-pr

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: generated-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for trusted generated PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        shell: bash
        run: |
          case "$PR_AUTHOR" in
            "dependabot[bot]"|"github-actions[bot]") ;;
            *) echo "Not a trusted generated PR author: $PR_AUTHOR"; exit 0 ;;
          esac
          if test "$PR_DRAFT" = true; then
            echo "Draft PR; auto-merge not enabled."
            exit 0
          fi
          case ",$PR_LABELS," in
            *,auto-merge,*) ;;
            *) echo "Missing auto-merge label; leaving PR for review."; exit 0 ;;
          esac
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
