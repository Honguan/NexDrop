name: Diagnose NexDrop 2.0 Go

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/refactor-node-chat-enrollment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/refactor-node-chat-enrollment
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with: {go-version-file: go.mod, cache: true}
      - name: Fix and verify Go integration test
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('internal/postgres/store_integration_test.go')
          value = path.read_text()
          old = '\tnotifications, err := store.PendingNotifications(ctx, targetDevice.ID)'
          new = '\tnotifications, err = store.PendingNotifications(ctx, targetDevice.ID)'
          if old in value:
              path.write_text(value.replace(old, new, 1))
          PY
          gofmt -w internal/postgres/store_integration_test.go
          go vet ./...
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add internal/postgres/store_integration_test.go
          if ! git diff --cached --quiet; then
            git commit -m 'test: fix notification variable reuse'
            git push origin HEAD:agent/refactor-node-chat-enrollment
          fi
