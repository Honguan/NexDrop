name: Apply final NexDrop fixes

on:
  pull_request:
    branches: [master]
    paths:
      - .github/workflows/diagnose-client.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-windows-exit-device-join
          fetch-depth: 0
      - name: Fix analyzer and load scenario
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          main = Path('client/lib/main.dart')
          text = main.read_text()
          old = """  if (value < 1024 * 1024 * 1024)\n    return '${(value / (1024 * 1024)).toStringAsFixed(1)} MB';\n"""
          new = """  if (value < 1024 * 1024 * 1024) {\n    return '${(value / (1024 * 1024)).toStringAsFixed(1)} MB';\n  }\n"""
          if text.count(old) != 1:
              raise SystemExit('unexpected _formatBytes source')
          main.write_text(text.replace(old, new))

          loadtest = Path('cmd/nexdrop-loadtest/main.go')
          text = loadtest.read_text()
          admin = """\tadmin, err := client.login(ctx, config.username, config.password)\n\tif err != nil {\n\t\treturn scenarioState{}, err\n\t}\n"""
          approvals = """\tfor index, device := range devices {\n\t\tif err := client.request(ctx, http.MethodPost, \"/api/devices/\"+device.id+\"/approve\", admin.AccessToken, nil, http.StatusOK, nil); err != nil {\n\t\t\treturn scenarioState{}, fmt.Errorf(\"approve device %d: %w\", index+1, err)\n\t\t}\n\t}\n\n"""
          if text.count(admin) != 1 or text.count(approvals) != 1:
              raise SystemExit('unexpected load-test setup source')
          loadtest.write_text(text.replace(admin, '').replace(approvals, ''))
          PY
          rm -f .github/workflows/diagnose-client.yml
          git diff --check
      - name: Commit fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "OpenAI Codex"
          git config user.email "codex@openai.com"
          git add -A
          git commit -m "fix: align client lint and trusted device load test"
          git push origin HEAD:agent/fix-windows-exit-device-join
